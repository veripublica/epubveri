name: Release binaries

# Builds the `epubveri` CLI for a broad set of Linux/macOS/Windows targets
# and attaches the archives to the matching GitHub Release.
#
# Two jobs on purpose. The 8 build jobs only ever produce artifacts; a single
# `release` job then collects them and writes to the Release once. Having all
# 8 attach concurrently - which is what this did until v0.5.10 - means 8
# writers racing for one release, and the failure mode is not a clean one: on
# v0.5.10 a GitHub API outage (`GET /releases/tags/{tag}` returning its error
# page instead of JSON) took out 7 of the 8 and left the release *published
# with 1 of 8 binaries*. That looks released. Nobody notices that 7 platforms
# silently have nothing. One writer means one failure, and a failed release
# looks failed. Pure Rust with
# no C dependencies, so every target builds on a runner of its own native
# architecture (x86_64 and ARM64 runners for both Linux and macOS; the one
# genuine cross-compile is ARM64 Windows, which the MSVC toolchain links
# from the x86_64 Windows runner). The only per-target setup is `musl-tools`
# for the static-musl Linux builds. Triggered automatically when a `v*` tag
# is pushed (the same tags already used for GitHub Releases);
# `workflow_dispatch` allows a manual re-run against an existing tag (e.g. to
# backfill a release with newly-added targets).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag/release to attach binaries to (e.g. v0.4.0)"
        required: true

# GITHUB_TOKEN defaults to read-only. Only the `release` job needs to write,
# so the write scope is granted there rather than to the build matrix.
permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 - glibc (portable across mainstream distros) and
          # musl (fully static, runs anywhere incl. Alpine / very old glibc).
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          # Linux ARM64 - native on GitHub's ARM64 runner (Raspberry Pi,
          # Graviton/Ampere servers, ARM CI).
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
          # macOS - Intel and Apple Silicon.
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          # Windows - x86_64 (native) and ARM64 (cross-linked by MSVC).
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out
        uses: actions/checkout@v5

      # The static-musl targets link with musl-gcc; every other target uses
      # the runner's default toolchain as-is.
      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Build (release)
        run: cargo build --release --locked --bin epubveri --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          stage="epubveri-${{ matrix.target }}"
          mkdir "$stage"
          cp "target/${{ matrix.target }}/release/epubveri" "$stage/"
          cp LICENSE LICENSE-COMMERCIAL.md README.md "$stage/"
          tar czf "$stage.tar.gz" "$stage"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $stage = "epubveri-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $stage | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/epubveri.exe" $stage/
          Copy-Item LICENSE, LICENSE-COMMERCIAL.md, README.md $stage/
          Compress-Archive -Path $stage -DestinationPath "$stage.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: epubveri-${{ matrix.target }}
          path: |
            epubveri-${{ matrix.target }}.tar.gz
            epubveri-${{ matrix.target }}.zip
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out
        uses: actions/checkout@v5

      # Every build job's archive, into one directory.
      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: List what will be attached
        run: ls -l dist

      # Populate the GitHub Release body from this version's CHANGELOG.md
      # section, so the release notes never have to be filled in by hand
      # (they used to be, and got forgotten for a few releases).
      - name: Extract release notes from CHANGELOG
        shell: bash
        run: |
          tag="${{ inputs.tag || github.ref_name }}"
          ver="${tag#v}"
          awk -v ver="$ver" '
            $0 ~ "^## \\[" ver "\\]" {inblk=1; next}
            inblk && /^## \[/ {exit}
            inblk { if (!started && $0 ~ /^[[:space:]]*$/) next; started=1; buf[n++]=$0 }
            END { last=n-1; while (last>=0 && buf[last] ~ /^[[:space:]]*$/) last--; for (i=0;i<=last;i++) print buf[i] }
          ' CHANGELOG.md > RELEASE_NOTES.md
          printf '\n\nFull notes: [CHANGELOG.md](https://github.com/veripublica/epubveri/blob/main/CHANGELOG.md). Also on [crates.io](https://crates.io/crates/epubveri/%s).\n' "$ver" >> RELEASE_NOTES.md
          echo "----- extracted release notes -----"
          cat RELEASE_NOTES.md

      # One writer, one call, every archive.
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: dist/*
