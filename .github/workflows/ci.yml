name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v5

      # ubuntu-latest ships stable Rust + rustfmt/clippy; we only add the
      # wasm target for the smoke builds below. (The styloria dependency now
      # comes from crates.io, so there's no sibling checkout to wire up.)
      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Format (cargo fmt --check)
        run: cargo fmt --all --check

      - name: Build (workspace)
        run: cargo build --workspace --locked

      - name: Test (workspace)
        run: cargo test --workspace --locked

      # Prove the validator still compiles to WebAssembly: the core library
      # and the epubveri-wasm bindings crate (which exercises the
      # wasm-bindgen / tsify codegen). A full `wasm-pack build` is run locally
      # before publishing; this is the lighter, tooling-free CI smoke test.
      - name: Build core lib for wasm32
        run: cargo build --lib --target wasm32-unknown-unknown --locked

      - name: Build epubveri-wasm for wasm32
        run: cargo build -p epubveri-wasm --target wasm32-unknown-unknown --locked
